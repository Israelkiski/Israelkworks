<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Israel K Works</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,500&family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/x-icon" href="/Pictures/squareImage-1200x1200.png">
</head>
<body class="home">

<button class="nav-toggle" id="navToggle" aria-label="Open menu" aria-expanded="false">
  <span></span><span></span><span></span>
</button>

<div class="nav-overlay" id="navOverlay"></div>

<nav class="sidenav" id="sideNav" aria-hidden="true">
  <a href="/">Home</a>
  <a href="#contact">Contact</a>
  <a href="#socials">Socials</a>
</nav>

<header class="hero">
  <h1 class="hero__title">Israel K. Works</h1>
</header>

<main class="buttons">

  <a href="/music" class="btn btn--music" aria-label="Enter Music">
    <span class="btn__label">Music</span>
  </a>

  <a href="/photography" class="btn btn--photo" aria-label="Enter Photography">
    <span class="btn__label">Photography</span>
  </a>

</main>

<script>
  const navToggle = document.getElementById('navToggle');
  const sideNav = document.getElementById('sideNav');
  const navOverlay = document.getElementById('navOverlay');

  function toggleNav() {
    const isOpen = document.body.classList.toggle('nav-open');
    navToggle.setAttribute('aria-expanded', isOpen);
    sideNav.setAttribute('aria-hidden', !isOpen);
  }

  navToggle.addEventListener('click', toggleNav);
  navOverlay.addEventListener('click', toggleNav);
</script>

</body>
</html>
